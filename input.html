<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .container {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 300px;
            text-align: center;
            background-color: #f9f9f9;
        }
        button {
            margin: 5px;
            padding: 5px 10px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .drm-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
        .drm-value {
            margin: 0 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
    </header>
    <main>
        <div class="container">
          <table>
            <tr align="left"><label><td>Leader </td><td><input type="checkbox" id="leader"></td></label></tr>
             <tr align="left"><label><td>Opposing Leader </td><td><input type="checkbox" id="opposing-leader"></td></label></tr>
             <tr align="left"><label><td>Open Flank </td><td><input type="checkbox" id="open-flank"></td></label></tr>
             <tr align="left"><label><td>Withdraw?</td><td>
                <select id="withdraw">
                    <option value="no">No</option>
                    <option value="yes">Yes</option>
                    <option value="maybe">Maybe</option>
                </select>
                </td>
            </label></tr>
             <tr align="left"><div class="drm-container">
                   <td>DRM</td>
               <td>
                <button onclick="changeDrm(-1)">-</button>
                <span id="drm-value">0</span>
                <button onclick="changeDrm(1)">+</button>
                </td>
               </div>
             </tr>
             <tr align="left"><label><td>Savannah Rule?</td><td>
                <select id="savannah">
                    <option value="no">No</option>
                    <option value="me">Me</option>
                    <option value="opponent">Opponent</option>
                </select>
                </td>
            </label></tr>
             
            </table>
          <button onclick="submitData()">Submit</button>
          <table>
            <tr align="left"><td>Expected DRM</td><td><input type="text" size="12" id="expected"/></td></tr>
            <tr align="left"><td>Suggested Tactic</td><td><input type="text" size="12" id="tactic"></td></tr>
          </table>

          <table border="1" id="alltactics">
          </table>

          <table>
            <tr><th cospan="2" >Probabilities</th></tr>
            <tr align="left"><td>Skirmish</td><td><input type="text" size="4" id="Skirmish"></td></tr>
            <tr align="left"><td>Echelon Assault</td><td><input type="text" size="4" id="Echelon Assault"></td></tr>
            <tr align="left"><td>Stand Fast</td><td><input type="text" size="4" id="Stand Fast"></td></tr>
            <tr align="left"><td>Withdraw</td><td><input type="text" size="4" id="Withdraw"></td></tr>
            <tr align="left"><td>Frontal Assault</td><td><input type="text" size="4" id="Frontal Assault"></td></tr>
            <tr align="left"><td>Commit Reserves</td><td><input type="text" size="4" id="Commit Reserves"></td></tr>
            <tr align="left"><td>Turn Flank</td><td><input type="text" size="4" id="Turn Flank"></td></tr>
            <tr align="left"><td>Refuse Flank</td><td><input type="text" size="4" id="Refuse Flank"></td></tr>
          </table>
        </div>
    </main>
    <footer>
    </footer>
    <script>
        let drm = 0;
        function changeDrm(value) {
            drm += value;
            document.getElementById("drm-value").textContent = drm;
        }
       async  function submitData() {
            const leader = document.getElementById("leader").checked;
            const opposingLeader = document.getElementById("opposing-leader").checked;
            const openFlank = document.getElementById("open-flank").checked;
           withdraw = document.getElementById("withdraw").value;
           savannah = document.getElementById("savannah").value

            if (withdraw == "yes")
                hexVal = 0
            else if (withdraw=="maybe")
                hexVal = 0.5
           else
               hexVal = 100;

           turnFlank = true
           oppTurnFlank = true
           if (savannah == "me")
               turnFlank = false
           else if (savannah == "opponent")
               oppTurnFlank = false               
               
            const data = {
                "leader" : leader,
                "oppLeader" : opposingLeader,
                "flank" : openFlank,
                "hexVal" : hexVal,
                "drm" : drm,
                "turnFlank": turnFlank,
                "oppTurnFlank":oppTurnFlank
            };
            console.log(JSON.stringify(data))

            response = await fetch("https://1q7v6joz50.execute-api.us-east-1.amazonaws.com/boar", {
                method: "POST",
                body: JSON.stringify(data)
            })
           console.log(response)
           jsonResponse = await response.json()
           console.log(jsonResponse)
           
           document.getElementById('expected').value = jsonResponse.expected
           document.getElementById('tactic').value = jsonResponse.suggestion

           probabilities = jsonResponse.values
           for (tactic in probabilities) {
               input = document.getElementById(tactic)
               if (input)
                   document.getElementById(tactic).value = probabilities[tactic]
           }

            /*
            fetch("https://mkq8rl2jql.execute-api.us-east-1.amazonaws.com/test/boar", {
                method: "POST",
                mode: 'no-cors',
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(data)
            }).then(data => { console.log("RETURNED ", data); return data; })
                .then(data => { return data.json(); } )
                .then(json => console.log("Success:", json))
                .catch(error => console.error("Error:", error)) ;
                */
        }
    </script>
</body>
</html>
